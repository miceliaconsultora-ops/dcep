<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gestión de Atletas - DCEP</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#bfff00",
                        "background-dark": "#050505",
                        "card-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Lexend', sans-serif; background-color: #050505; }
    </style>
</head>
<body class="bg-background-dark text-slate-100 min-h-screen flex flex-col font-display">

    <header class="sticky top-0 z-10 flex items-center bg-background-dark/95 backdrop-blur-md p-4 justify-between border-b border-primary/10">
        <a href="dashboard.html" class="flex size-10 items-center justify-center">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h2 class="text-lg font-bold leading-tight flex-1 text-center">Gestión de Atletas</h2>
        <div class="size-10"></div>
    </header>

    <main class="flex-1 overflow-y-auto pb-24 px-4 pt-6">
        <!-- Add Athlete Form -->
        <div id="admin-panel" class="hidden">
            <h3 class="text-sm font-bold uppercase tracking-[0.2em] text-primary mb-4 ml-1">Registrar Nuevo Atleta</h3>
            <div class="bg-card-dark rounded-2xl p-6 border border-white/5 space-y-4 shadow-xl mb-10">
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-500 mb-2 block ml-1">Nombre Completo</label>
                    <input type="text" id="athlete-name" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 focus:border-primary/50 text-white outline-none transition-all">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-500 mb-2 block ml-1">Categoría</label>
                    <select id="athlete-category" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 focus:border-primary/50 text-white outline-none transition-all">
                        <option value="Principiante">Principiante</option>
                        <option value="Intermedio">Intermedio</option>
                        <option value="Avanzado">Avanzado</option>
                        <option value="Pro">Pro</option>
                    </select>
                </div>
                <button id="add-btn" class="w-full bg-primary text-black font-black py-4 rounded-xl shadow-lg uppercase tracking-widest text-xs mt-2">
                    Añadir Atleta
                </button>
            </div>
        </div>

        <h3 class="text-sm font-bold uppercase tracking-[0.2em] text-primary mb-4 ml-1">Lista de Atletas</h3>
        <div id="athletes-list" class="space-y-3">
            <!-- Loaded athletes -->
        </div>

        <div id="restricted-overlay" class="fixed inset-0 bg-black flex flex-col items-center justify-center p-10 text-center z-50">
            <span class="material-symbols-outlined text-red-500 text-6xl mb-4">lock</span>
            <h2 class="text-2xl font-black mb-2">Acceso Restringido</h2>
            <p class="text-slate-400 text-sm mb-8">Solo los administradores pueden gestionar la base de datos de atletas.</p>
            <a href="login.html" class="bg-white/10 px-8 py-3 rounded-full font-bold">Volver al Login</a>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://nfmbklhhrrnrakndkcch.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mbWJrbGhocnJucmFrbmRrY2NoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODQ3NjUsImV4cCI6MjA4OTE2MDc2NX0.dHlnfYMJ4d9y8zdwSWC6bGqDCwwUy8F1QL8729BeTOQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkAdmin() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return;

            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('is_admin')
                .eq('id', session.user.id)
                .single();

            if (profile && profile.is_admin) {
                document.getElementById('restricted-overlay').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        }

        async function fetchAthletes() {
            const { data, error } = await supabaseClient.from('athletes').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('athletes-list');
            if (data) {
                list.innerHTML = data.map(a => `
                    <div class="bg-card-dark border border-white/5 rounded-xl p-4 flex justify-between items-center shadow-lg">
                        <div>
                            <p class="font-bold text-white">${a.name}</p>
                            <p class="text-[10px] uppercase font-bold text-primary/60 tracking-widest">${a.category}</p>
                        </div>
                        <button class="size-8 rounded-lg bg-red-500/10 text-red-500 flex items-center justify-center" onclick="deleteAthlete('${a.id}')">
                            <span class="material-symbols-outlined text-sm">delete</span>
                        </button>
                    </div>
                `).join('');
            }
        }

        document.getElementById('add-btn').onclick = async () => {
            const name = document.getElementById('athlete-name').value;
            const category = document.getElementById('athlete-category').value;
            if(!name) return alert("Ingresa un nombre");

            const { error } = await supabaseClient.from('athletes').insert([{ name, category }]);
            if(error) alert("Error: " + error.message);
            else {
                document.getElementById('athlete-name').value = '';
                fetchAthletes();
            }
        };

        window.deleteAthlete = async (id) => {
            if(!confirm("¿Eliminar este atleta?")) return;
            const { error } = await supabaseClient.from('athletes').delete().eq('id', id);
            if(error) alert("Error: " + error.message);
            else fetchAthletes();
        }

        checkAdmin();
        fetchAthletes();
    </script>
</body>
</html>
